# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci


  publish-gpr:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: check out code
        uses: actions/checkout@v4
        
      - name: Install NodeJS 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com/
          
      - name: "show the secret of VIctoria"
        run: |
              echo "now we will see the victoria secret : ${{secrets.VICTORIA_SECRET}}"
      - name: show me the Variable
        run: |
              echo "the vairable is: ${{vars.var1}}"
              
      - run: npm ci
      - run: npm run build --if-present
      
      - name: Running & testing the node app
        run: |
              npm start &
              npx wait-on http://localhost:3000
              curl http://localhost:3000
              
      - name: Pack the project into a tarball
        run: npm pack
        
      - name: Upload Package as GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-hello-artifact
          path: '*.tgz' 

